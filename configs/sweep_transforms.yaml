base: configs/default.yaml

# Sweep over image preprocessing transforms.
# ADC magnitude matters — per-image normalization excluded.
# All transforms applied at training time to raw ADC tensors.
#
#   none       — raw ADC; baseline (col ~0–2500, ind ~0–1200)
#   log1p      — log(1+x); current default; heavy tail compression
#   sqrt       — √x; lighter compression, preserves Bragg peak contrast better
#   mpv_linear — col÷500, ind÷250; linear, mode→1.0 per channel, full magnitude range
#   mpv_tanh   — tanh(col/500), tanh(ind/250); mode→0.76, smooth soft saturation
#   hill_mpv   — col/(col+500), ind/(ind+250); f(MPV)=0.5, linear at low ADC
#
# Architecture fixed to isolate transform effect.
# Total: 6 transforms × 2 channel configs × 2 latents = 24 runs

grid:
  data.transform:
    - none
    - log1p
    - sqrt
    - mpv_linear
    - mpv_tanh
    - hill_mpv
  model.latent: [8]
  model.channels:
    - [32, 64, 128, 256]
  model.activation: [relu]
  train.beta: [0.5]
  model.input_hw:
    - [48, 48]

