data:
  path: /Volumes/easystore/proton-kaon/images/pk_48x48_raw_10-179wires.pt
  proton: p
  kaon: k
  transform: log1p
  val_split: 0.1
  random_seed: 42

model:
  type: vae
  latent: 4
  input_hw: [256, 256]
  channels: [32, 64, 128, 256]
  kernel: 5
  activation: softplus
  stride: 2
  padding: 2
  dropout: 0

optimizer:
  lr: 0.001
  weight_decay: 0.0001

train:
  epochs: 500
  batch_size: 32
  beta: 10.0
  patience: 20
  min_delta: 0.0001

output:
  dir: /Volumes/easystore/proton-kaon/models
  splits_dir: /Volumes/easystore/proton-kaon/training
  inference_dir: /Volumes/easystore/proton-kaon/inference